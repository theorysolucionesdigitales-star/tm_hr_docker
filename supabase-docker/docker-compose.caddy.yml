services:

  kong:
    ports: !reset []
    environment:
      KONG_PORT_MAPS: "443:8000,443:8443"

  # En modo Caddy el frontend no expone puerto 80 directamente;
  # Caddy hace de reverse proxy y gestiona el SSL.
  frontend:
    ports: !reset []

  caddy:
    container_name: supabase-caddy
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "8443:8443"   # Supabase Studio (https://tailormaderesearch.cl:8443)
    depends_on:
      kong:
        condition: service_healthy
      studio:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      PROXY_DOMAIN: ${PROXY_DOMAIN}
      PROXY_AUTH_USERNAME: ${DASHBOARD_USERNAME}
      PROXY_AUTH_PASSWORD: ${DASHBOARD_PASSWORD}
    command:
      - /bin/sh
      - -c
      - |
        PROXY_AUTH_PASSWORD=$$(caddy hash-password --plaintext "$$PROXY_AUTH_PASSWORD") && \
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - ./volumes/proxy/caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
